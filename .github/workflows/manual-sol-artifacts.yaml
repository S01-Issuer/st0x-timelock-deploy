name: Deploy Timelock
on:
  workflow_dispatch:
    inputs:
      PROPOSER_1:
        description: "Proposer 1 address (optional; falls back to secrets.PROPOSER_1)"
        required: false
        type: string
      PROPOSER_2:
        description: "Proposer 2 address (optional; falls back to secrets.PROPOSER_2)"
        required: false
        type: string
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Run tests
        run: forge test -vv

      - name: Simulate deploy (in-memory, no broadcast)
        run: forge script script/SimulateDeploy.s.sol --sig "run()" -vvvv
        env:
          PROPOSER_1: ${{ inputs.PROPOSER_1 || secrets.PROPOSER_1 }}
          PROPOSER_2: ${{ inputs.PROPOSER_2 || secrets.PROPOSER_2 }}

      - name: Simulate deploy (fork Base, no broadcast)
        run: |
          DEPLOYER=$(cast wallet address --private-key "$PRIVATE_KEY")
          forge script script/SimulateDeploy.s.sol \
            --rpc-url base \
            --sender "$DEPLOYER" \
            -vvvv
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          RPC_URL_BASE: ${{ secrets.RPC_URL_BASE }}
          PROPOSER_1: ${{ inputs.PROPOSER_1 || secrets.PROPOSER_1 }}
          PROPOSER_2: ${{ inputs.PROPOSER_2 || secrets.PROPOSER_2 }}

      - name: Deploy DeployTimelock to Base
        run: |
          forge script script/DeployTimelock.s.sol \
            --rpc-url base \
            --broadcast \
            --verify \
            -vvvv
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PROPOSER_1: ${{ inputs.PROPOSER_1 || secrets.PROPOSER_1 }}
          PROPOSER_2: ${{ inputs.PROPOSER_2 || secrets.PROPOSER_2 }}
          RPC_URL_BASE: ${{ secrets.RPC_URL_BASE }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
